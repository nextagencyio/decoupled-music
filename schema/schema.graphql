type NodeRelease implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  body: TextSummary
  changed: DateTime!
  coverArt: Image
  created: DateTime!
  duration: String
  genre: [TermUnion!]
  langcode: Language!
  path: String
  promote: Boolean!
  recordLabel: String
